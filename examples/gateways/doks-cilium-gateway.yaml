apiVersion: v1
kind: Namespace
metadata:
  name: rek8s-ingress
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rek8s-public
  namespace: rek8s-ingress
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      # Required when terminating TLS at the Gateway instead of the
      # DigitalOcean load balancer.
      service.beta.kubernetes.io/do-loadbalancer-tls-passthrough: "true"
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          # The Secret must exist in the same namespace as the Gateway.
          - kind: Secret
            name: placeholder-doks-gateway-cert
