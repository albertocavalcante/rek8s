# reclient config for a local port-forward to a rek8s Buildfarm deployment.
#
# Usage:
#   kubectl port-forward -n rek8s-rbe svc/<buildfarm-server-service> 8980:8980
#   bootstrap -re_proxy=/path/to/reproxy -cfg=/path/to/this-file

service=127.0.0.1:8980
server_address=unix:///tmp/reproxy.sock
proxy_log_dir=/tmp/reproxy
output_dir=/tmp/reproxy
service_no_auth=true
use_rpc_credentials=false
depsscanner_address=execrel://
