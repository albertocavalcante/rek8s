# rek8s cluster profile: Vanilla Kubernetes with ingress-nginx
#
# Use this on generic upstream Kubernetes distributions where you install:
#   - a CNI that enforces standard NetworkPolicy
#   - ingress-nginx
#   - cert-manager (optional but recommended for TLS)
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/vanilla-nginx.yaml \
#     --set global.domain=build.example.com

global:
  domain: "build.example.com"
  storageClass: ""  # use the cluster default StorageClass
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

bes:
  buildbuddy:
    enabled: true
    replicaCount: 2
    storage:
      type: disk
      disk:
        size: 50Gi
    database:
      type: mysql
      # mysql:
      #   host: mysql.example.svc
      #   port: 3306
      #   user: buildbuddy
      #   database: buildbuddy
      #   existingSecret: buildbuddy-mysql

rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 2
    worker:
      replicaCount: 4
      storage:
        size: 100Gi
    redis:
      type: embedded

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: true
    provider: kubernetes

  ingress:
    enabled: true
    provider: nginx
    className: nginx

  certManager:
    enabled: true

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false
