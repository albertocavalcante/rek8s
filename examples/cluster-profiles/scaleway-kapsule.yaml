# rek8s cluster profile: Scaleway Kubernetes Kapsule
#
# For Kapsule clusters using:
#   - the managed Scaleway control plane and CCM
#   - a user-installed ingress controller such as ingress-nginx
#   - the default Scaleway Block Volume StorageClass
#
# Prerequisites:
#   - ingress-nginx installed on the cluster
#   - ingressClassName nginx available
#   - cert-manager installed if TLS is enabled
#   - pick a CNI with netpol support (Scaleway supports cilium and calico)
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/scaleway-kapsule.yaml \
#     --set global.domain=build.example.com

global:
  domain: "build.example.com"
  storageClass: ""  # Kapsule documents a default Block Volume StorageClass
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

bes:
  buildbuddy:
    enabled: true
    replicaCount: 2
    storage:
      type: disk
      disk:
        size: 50Gi
    database:
      type: mysql
      # mysql:
      #   host: mysql.internal.example
      #   port: 3306
      #   user: buildbuddy
      #   database: buildbuddy
      #   existingSecret: buildbuddy-mysql

rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 2
    worker:
      replicaCount: 4
      storage:
        size: 100Gi
    redis:
      type: embedded

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: true
    provider: kubernetes

  ingress:
    enabled: true
    provider: nginx
    className: nginx

  certManager:
    enabled: true

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false
