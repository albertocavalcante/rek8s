# rek8s cluster profile: Akamai Cloud / Linode Kubernetes Engine (LKE)
#
# For LKE clusters using:
#   - the managed Linode Cloud Controller Manager
#   - a user-installed ingress controller such as ingress-nginx
#   - Linode Block Storage via the managed CSI driver
#
# Prerequisites:
#   - ingress-nginx installed on the cluster
#   - ingressClassName nginx available
#   - cert-manager installed if TLS is enabled
#   - Cloud Firewall Controller recommended if you want node-level firewalling
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/linode-lke.yaml \
#     --set global.domain=build.example.com

global:
  domain: "build.example.com"
  storageClass: "linode-block-storage"
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

bes:
  buildbuddy:
    enabled: true
    replicaCount: 2
    storage:
      type: disk
      disk:
        size: 50Gi
    database:
      type: mysql
      # mysql:
      #   host: mysql.internal.example
      #   port: 3306
      #   user: buildbuddy
      #   database: buildbuddy
      #   existingSecret: buildbuddy-mysql

rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 2
    worker:
      replicaCount: 4
      storage:
        size: 100Gi
    redis:
      type: embedded

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: true
    provider: kubernetes

  ingress:
    enabled: true
    provider: nginx
    className: nginx

  certManager:
    enabled: true

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false
