# rek8s cluster profile: RKE2 + Traefik Gateway API
#
# For RKE2 clusters using:
#   - Traefik as the ingress controller
#   - Gateway API enabled in the packaged Traefik chart
#   - a CNI that enforces standard Kubernetes NetworkPolicy
#
# Prerequisites:
#   - RKE2 configured with ingress-controller: traefik
#   - examples/traefik/rke2-traefik-gateway-config.yaml applied on the server
#   - Gateway API CRDs installed
#   - Gateway named rek8s-public created from
#     examples/gateways/traefik-public-gateway.yaml
#   - a default StorageClass available in the cluster
#   - cert-manager installed if TLS is enabled
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/rke2-traefik-gateway.yaml \
#     --set global.domain=build.example.com

global:
  domain: "build.example.com"
  storageClass: ""  # use the cluster default StorageClass
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

bes:
  buildbuddy:
    enabled: true
    replicaCount: 2
    storage:
      type: disk
      disk:
        size: 50Gi
    database:
      type: mysql
      # mysql:
      #   host: mysql.internal.example
      #   port: 3306
      #   user: buildbuddy
      #   database: buildbuddy
      #   existingSecret: buildbuddy-mysql

rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 2
    worker:
      replicaCount: 4
      storage:
        size: 100Gi
    redis:
      type: embedded

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: true
    provider: kubernetes

  ingress:
    enabled: true
    provider: gateway-api
    gatewayRef:
      name: rek8s-public
      namespace: rek8s-ingress

  certManager:
    enabled: true

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false
