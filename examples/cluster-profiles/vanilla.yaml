# rek8s cluster profile: Vanilla / Dev / CI
#
# Minimal configuration for development or CI clusters:
#   - Standard Kubernetes NetworkPolicy (any CNI)
#   - nginx Ingress Controller
#   - Self-signed TLS (optional)
#   - No monitoring stack required
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/vanilla.yaml

global:
  domain: "localhost"
  storageClass: ""  # use cluster default
  tls:
    enabled: false

namespaces:
  create: true
  bes: rek8s-bes
  rbe: rek8s-rbe
  monitoring: rek8s-monitoring

# BES only -- good starting point
bes:
  buildbuddy:
    enabled: true
    replicaCount: 1
    service:
      type: NodePort
    storage:
      type: disk
      disk:
        size: 10Gi
    database:
      type: sqlite
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

# RBE: Buildfarm (simplest RBE option)
rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 1
    worker:
      replicaCount: 2
      storage:
        size: 20Gi
    redis:
      type: embedded
    config:
      digestFunction: SHA256

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: false  # dev clusters often lack CNI netpol support
    provider: kubernetes

  ingress:
    enabled: false  # use NodePort / port-forward in dev

  certManager:
    enabled: false

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false

podDisruptionBudget:
  enabled: false

autoscaling:
  enabled: false
