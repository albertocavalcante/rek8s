# rek8s cluster profile: IBM Cloud Kubernetes Service (VPC)
#
# For IBM Cloud Kubernetes Service VPC clusters using:
#   - IBM-managed VPC load balancers behind Kubernetes LoadBalancer services
#   - a user-installed ingress controller such as ingress-nginx
#   - IBM Block Storage for VPC
#
# Prerequisites:
#   - ingress-nginx installed on the cluster
#   - ingressClassName nginx available
#   - cert-manager installed if TLS is enabled
#   - VPC block storage add-on available in the cluster
#
# Usage:
#   helm install rek8s ./charts/rek8s \
#     -f examples/cluster-profiles/ibm-cloud-vpc.yaml \
#     --set global.domain=build.example.com

global:
  domain: "build.example.com"
  storageClass: "ibmc-vpc-block-10iops-tier"
  tls:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer

bes:
  buildbuddy:
    enabled: true
    replicaCount: 2
    storage:
      type: disk
      disk:
        size: 50Gi
    database:
      type: mysql
      # mysql:
      #   host: mysql.internal.example
      #   port: 3306
      #   user: buildbuddy
      #   database: buildbuddy
      #   existingSecret: buildbuddy-mysql

rbe:
  buildfarm:
    enabled: true
    server:
      replicaCount: 2
    worker:
      replicaCount: 4
      storage:
        size: 100Gi
    redis:
      type: embedded

  buildbarn:
    enabled: false

cluster:
  networkPolicy:
    enabled: true
    provider: kubernetes

  ingress:
    enabled: true
    provider: nginx
    className: nginx

  certManager:
    enabled: true

observability:
  prometheus:
    serviceMonitor: false
  grafana:
    dashboards: false
