{{- if and .Values.cluster.networkPolicy.enabled (eq .Values.cluster.networkPolicy.provider "calico") .Values.cluster.networkPolicy.defaultDeny.enabled }}
# Default deny all traffic in rek8s namespaces.
# Component-specific allow rules override this (lower order number = higher priority).
{{- $namespaces := list .Values.namespaces.bes .Values.namespaces.cache .Values.namespaces.rbe }}
{{- range $ns := $namespaces }}
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ $ns }}
spec:
  selector: all()
  order: 1000
  types:
    - Ingress
    - Egress
  # Implicit deny -- no rules means all traffic is denied.
  # Component-specific policies with lower order numbers take precedence.
  egress:
    # Always allow DNS so service discovery works
    - action: Allow
      protocol: UDP
      destination:
        ports:
          - 53
    - action: Allow
      protocol: TCP
      destination:
        ports:
          - 53
{{- end }}
{{- end }}
