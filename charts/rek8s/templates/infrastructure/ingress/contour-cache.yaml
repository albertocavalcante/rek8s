{{- if and .Values.cluster.ingress.enabled (eq .Values.cluster.ingress.provider "contour") .Values.cache.bazelRemote.enabled }}
# Contour HTTPProxy for bazel-remote -- HTTP status / metrics
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: {{ include "rek8s.fullname" . }}-cache-http
  namespace: {{ .Values.namespaces.cache }}
  labels:
    {{- include "rek8s.labels" . | nindent 4 }}
  {{- with .Values.cluster.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  virtualhost:
    fqdn: cache.{{ .Values.global.domain }}
    {{- if .Values.global.tls.enabled }}
    tls:
      secretName: {{ include "rek8s.fullname" . }}-cache-tls
      minimumProtocolVersion: "1.2"
    {{- end }}
  routes:
    - conditions:
        - prefix: /
      services:
        - name: {{ include "rek8s.fullname" . }}-bazel-remote
          port: {{ .Values.cache.bazelRemote.service.httpPort }}
---
# Contour HTTPProxy for bazel-remote -- gRPC cache
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: {{ include "rek8s.fullname" . }}-cache-grpc
  namespace: {{ .Values.namespaces.cache }}
  labels:
    {{- include "rek8s.labels" . | nindent 4 }}
  {{- with .Values.cluster.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  virtualhost:
    fqdn: cache-grpc.{{ .Values.global.domain }}
    {{- if .Values.global.tls.enabled }}
    tls:
      secretName: {{ include "rek8s.fullname" . }}-cache-grpc-tls
      minimumProtocolVersion: "1.2"
    {{- end }}
  routes:
    - conditions:
        - prefix: /
      services:
        - name: {{ include "rek8s.fullname" . }}-bazel-remote
          port: {{ .Values.cache.bazelRemote.service.grpcPort }}
          protocol: h2c
      timeoutPolicy:
        response: 1h
        idle: 600s
{{- end }}
